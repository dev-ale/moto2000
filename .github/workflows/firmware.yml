name: Firmware

on:
  push:
    branches: [main]
    tags:
      - "v*"
    paths:
      - "hardware/firmware/**"
      - "protocol/**"
      - ".clang-format"
      - ".github/workflows/firmware.yml"
  pull_request:
    paths:
      - "hardware/firmware/**"
      - "protocol/**"
      - ".clang-format"
      - ".github/workflows/firmware.yml"
      - "app/ios/Packages/RideSimulatorKit/**"

concurrency:
  group: firmware-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build cppcheck clang-format

      - name: clang-format
        run: |
          find hardware/firmware \
            \( -name '*.c' -o -name '*.h' \) \
            -not -path '*/build/*' \
            -not -path '*/managed_components/*' \
            -print0 |
            xargs -0 clang-format --dry-run --Werror

      - name: cppcheck
        run: |
          cppcheck \
            --enable=warning,style,performance,portability \
            --error-exitcode=1 \
            --inline-suppr \
            --suppressions-list=hardware/firmware/.cppcheck-suppressions \
            --quiet \
            hardware/firmware/main \
            hardware/firmware/components \
            hardware/firmware/test/host \
            hardware/firmware/host-sim/src \
            hardware/firmware/host-sim/include \
            hardware/firmware/host-sim/tests

      - name: Unity host tests
        run: |
          cmake -S hardware/firmware/test/host -B hardware/firmware/test/host/build -G Ninja
          cmake --build hardware/firmware/test/host/build
          ctest --test-dir hardware/firmware/test/host/build --output-on-failure

  host-sim:
    name: Host simulator + snapshot tests
    runs-on: ubuntu-latest
    env:
      SDL_VIDEODRIVER: dummy
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build

      - name: Build + test
        run: |
          cmake -S hardware/firmware/host-sim -B hardware/firmware/host-sim/build -G Ninja
          cmake --build hardware/firmware/host-sim/build
          ctest --test-dir hardware/firmware/host-sim/build --output-on-failure

      - name: Upload mismatched snapshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: host-sim-snapshot-diffs
          path: hardware/firmware/host-sim/build/snapshot-out/
          if-no-files-found: ignore

  idf-build:
    name: ESP-IDF build (esp32s3)
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:release-v5.3
    steps:
      - uses: actions/checkout@v4

      - name: Build
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          cd hardware/firmware
          idf.py set-target esp32s3
          idf.py build

  release-artifact:
    name: Build + sign firmware
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    container:
      image: espressif/idf:release-v5.3
    steps:
      - uses: actions/checkout@v4

      - name: Build
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          cd hardware/firmware
          idf.py set-target esp32s3
          idf.py build

      - name: Sign (placeholder)
        shell: bash
        run: |
          echo "TODO: sign build/scramscreen.bin with HMAC-SHA256 using OTA_SIGNING_KEY secret"

      - uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.ref_name }}
          path: |
            hardware/firmware/build/scramscreen.bin

name: iOS

on:
  push:
    branches: [main]
    paths:
      - "app/ios/**"
      - "protocol/**"
      - ".swiftlint.yml"
      - ".swift-format"
      - ".github/workflows/ios.yml"
  pull_request:
    paths:
      - "app/ios/**"
      - "protocol/**"
      - ".swiftlint.yml"
      - ".swift-format"
      - ".github/workflows/ios.yml"

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (SwiftLint + swift-format)
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4

      - name: swift-format --lint
        working-directory: app/ios
        run: |
          swift-format lint --configuration ../../.swift-format --recursive Sources Tests UITests

      - name: SwiftLint
        run: swiftlint --strict --config .swiftlint.yml

  package-tests:
    name: Swift package tests (${{ matrix.package }})
    runs-on: [self-hosted, macOS]
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        package:
          - BLEProtocol
          - RideSimulatorKit
          - BLECentralClient
          - ScramCore
    steps:
      - uses: actions/checkout@v4

      - name: swift test
        working-directory: app/ios/Packages/${{ matrix.package }}
        run: swift test --parallel

  test:
    name: Build & test
    runs-on: [self-hosted, macOS]
    needs: [lint, package-tests]
    env:
      TUIST_DEVELOPMENT_TEAM: ${{ secrets.TUIST_DEVELOPMENT_TEAM }}
    steps:
      - uses: actions/checkout@v4

      - name: Tuist version
        run: tuist version

      - name: Tuist install
        working-directory: app/ios
        run: tuist install

      - name: Tuist generate
        working-directory: app/ios
        run: tuist generate --no-open

      - name: Pick simulator
        id: sim
        run: |
          DEST=$(xcrun simctl list devices available -j \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' not in runtime:
                  continue
              for d in devices:
                  if 'iPhone' in d['name'] and d['isAvailable']:
                      print(f\"platform=iOS Simulator,id={d['udid']}\")
                      sys.exit(0)
          sys.exit(1)
          ")
          echo "destination=$DEST" >> "$GITHUB_OUTPUT"

      - name: xcodebuild test
        working-directory: app/ios
        run: |
          xcodebuild \
            -workspace ScramScreen.xcworkspace \
            -scheme ScramScreen \
            -configuration Debug \
            -destination '${{ steps.sim.outputs.destination }}' \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO \
            test

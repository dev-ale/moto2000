# Install with `pip install pre-commit && pre-commit install`.
# Runs on every commit and mirrors what CI enforces, so issues surface locally.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-yaml
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: trailing-whitespace

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v18.1.8
    hooks:
      - id: clang-format
        types_or: [c, c++]
        files: ^hardware/firmware/.*\.(c|h)$

  - repo: local
    hooks:
      - id: swift-format
        name: swift-format
        language: system
        types: [swift]
        files: ^app/ios/(Sources|Tests|UITests)/.*\.swift$
        entry: swift-format lint --configuration .swift-format
        pass_filenames: true

      - id: swiftlint
        name: swiftlint
        language: system
        types: [swift]
        files: ^app/ios/(Sources|Tests|UITests)/.*\.swift$
        entry: swiftlint lint --strict --quiet --config .swiftlint.yml
        pass_filenames: false

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []

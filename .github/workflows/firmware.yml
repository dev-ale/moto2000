name: Firmware

on:
  push:
    branches: [main]
    paths:
      - "hardware/firmware/**"
      - ".clang-format"
      - ".github/workflows/firmware.yml"
  pull_request:
    paths:
      - "hardware/firmware/**"
      - ".clang-format"
      - ".github/workflows/firmware.yml"

concurrency:
  group: firmware-${{ github.ref }}
  cancel-in-progress: true

jobs:
  host-tests:
    name: Unity host tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build cppcheck clang-format

      - name: Configure
        run: cmake -S hardware/firmware/test/host -B hardware/firmware/test/host/build -G Ninja

      - name: Build
        run: cmake --build hardware/firmware/test/host/build

      - name: Test
        run: ctest --test-dir hardware/firmware/test/host/build --output-on-failure

  lint:
    name: clang-format + cppcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang-format cppcheck

      - name: clang-format --dry-run
        run: |
          find hardware/firmware \
            \( -name '*.c' -o -name '*.h' \) \
            -not -path '*/build/*' \
            -not -path '*/managed_components/*' \
            -print0 |
            xargs -0 clang-format --dry-run --Werror

      - name: cppcheck
        run: |
          cppcheck \
            --enable=warning,style,performance,portability \
            --error-exitcode=1 \
            --inline-suppr \
            --suppressions-list=hardware/firmware/.cppcheck-suppressions \
            --quiet \
            hardware/firmware/main \
            hardware/firmware/test/host

  idf-build:
    name: ESP-IDF build (esp32s3)
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:release-v5.3
    steps:
      - uses: actions/checkout@v4

      - name: Build
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          cd hardware/firmware
          idf.py set-target esp32s3
          idf.py build

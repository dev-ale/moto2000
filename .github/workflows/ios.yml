name: iOS

on:
  push:
    branches: [main]
    paths:
      - "app/ios/**"
      - "protocol/**"
      - ".swiftlint.yml"
      - ".swift-format"
      - ".github/workflows/ios.yml"
  pull_request:
    paths:
      - "app/ios/**"
      - "protocol/**"
      - ".swiftlint.yml"
      - ".swift-format"
      - ".github/workflows/ios.yml"

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conventional-commits:
    name: Conventional Commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            style
            refactor
            perf
            test
            build
            ci
            revert
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" must start with a lowercase letter.

  lint-and-test:
    name: Lint + test
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4

      - name: swift-format --lint
        working-directory: app/ios
        run: swift-format lint --configuration ../../.swift-format --recursive Sources Tests UITests

      - name: SwiftLint
        run: swiftlint --strict --config .swiftlint.yml

      - name: Swift package tests
        run: |
          for pkg in BLEProtocol RideSimulatorKit BLECentralClient ScramCore; do
            echo "--- Testing $pkg ---"
            swift test --parallel --package-path "app/ios/Packages/$pkg"
          done

  build:
    name: Build & test
    runs-on: [self-hosted, macOS]
    needs: lint-and-test
    env:
      TUIST_DEVELOPMENT_TEAM: ${{ secrets.TUIST_DEVELOPMENT_TEAM }}
    steps:
      - uses: actions/checkout@v4

      - name: Tuist install + generate
        working-directory: app/ios
        run: |
          tuist install
          tuist generate --no-open

      - name: Pick iOS 26 simulator
        id: sim
        run: |
          DEST=$(xcrun simctl list devices available -j \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS-26' not in runtime and 'iOS 26' not in runtime:
                  continue
              for d in devices:
                  if 'iPhone' in d['name'] and d['isAvailable']:
                      print(f\"platform=iOS Simulator,id={d['udid']}\")
                      sys.exit(0)
          print('No iOS 26 iPhone simulator found', file=sys.stderr)
          sys.exit(1)
          ")
          echo "destination=$DEST" >> "$GITHUB_OUTPUT"

      - name: xcodebuild test
        working-directory: app/ios
        run: |
          xcodebuild \
            -workspace ScramScreen.xcworkspace \
            -scheme ScramScreen \
            -configuration Debug \
            -destination '${{ steps.sim.outputs.destination }}' \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO \
            test
